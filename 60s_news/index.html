<script>
    const repoOwner = 'qqhsx'; 
    const repoName = '60s'; 
    const path = 'articles';

    let articles = [];
    let currentIndex = 0;
    
    async function fetchArticles() {
        try {
            const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${path}`);
            if (!response.ok) throw new Error('网络响应失败');
    
            const files = await response.json();
            articles = files
                .filter(file => file.name.endsWith('.json'))
                .map(file => ({
                    name: file.name,
                    date: new Date(file.name.match(/\d{4}-\d{2}-\d{2}/)[0]),
                    download_url: file.download_url
                }));
    
            articles.sort((a, b) => b.date - a.date);
            loadArticle(currentIndex);
            updateButtons();
        } catch (error) {
            console.error('获取数据失败:', error);
            document.getElementById('news-profile').innerHTML = '获取数据失败: ' + error.message;
        }
    }
    
    async function loadArticle(index) {
        const contentResponse = await fetch(articles[index].download_url);
        if (!contentResponse.ok) throw new Error('获取文章内容失败');
    
        const contentData = await contentResponse.json();
        displayContent(contentData);
    }
    
    function displayContent(data) {
        const profileDiv = document.getElementById('news-profile');
        profileDiv.innerHTML = `<h2>${data.date}</h2><a href="${data.url}" target="_blank">来源链接</a>`;
        profileDiv.innerHTML += `<img src="${data.title_image}" alt="Title Image" />`;
        data.result.forEach(item => {
            profileDiv.innerHTML += `<p>${item}</p>`;
        });
    }
    
    function updateButtons() {
        document.getElementById('next-btn').style.display = currentIndex > 0 ? 'block' : 'none';
        document.getElementById('prev-btn').style.display = currentIndex < articles.length - 1 ? 'block' : 'none';
    }
    
    document.getElementById('next-btn').addEventListener('click', () => {
        if (currentIndex > 0) {
            currentIndex--;
            loadArticle(currentIndex);
            updateButtons();
        }
    });
    
    document.getElementById('prev-btn').addEventListener('click', () => {
        if (currentIndex < articles.length - 1) {
            currentIndex++;
            loadArticle(currentIndex);
            updateButtons();
        }
    });
    
    document.addEventListener('DOMContentLoaded', fetchArticles);
</script>

<script>
  window.addEventListener('tabs:register', () => {
    let { activeClass } = CONFIG.comments;
    if (CONFIG.comments.storage) {
      activeClass = localStorage.getItem('comments_active') || activeClass;
    }
    if (activeClass) {
      let activeTab = document.querySelector(`a[href="#comment-${activeClass}"]`);
      if (activeTab) {
        activeTab.click();
      }
    }
  });
  if (CONFIG.comments.storage) {
    window.addEventListener('tabs:click', event => {
      if (!event.target.matches('.tabs-comment .tab-content .tab-pane')) return;
      let commentClass = event.target.classList[1];
      localStorage.setItem('comments_active', commentClass);
    });
  }
</script>
