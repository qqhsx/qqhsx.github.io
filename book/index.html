<script>
document.addEventListener("DOMContentLoaded", function() {
  // 建议使用加速镜像地址，确保国内秒开
  // const jsonUrl = "https://jsd.onmicrosoft.cn/gh/qqhsx/book@main/data.json";
  const jsonUrl = "https://raw.githubusercontent.com/qqhsx/book/main/data.json";
  const shelfContainer = document.getElementById("bn-dynamic-bookshelf");

  fetch(jsonUrl)
    .then(response => {
      if (!response.ok) throw new Error("无法获取书籍数据");
      return response.json();
    })
    .then(books => {
      // 清空加载提示
      shelfContainer.innerHTML = "";

      // 1. 按分类将书籍归档
      const categorizedBooks = {};
      books.forEach(book => {
        let genre = book.genre || "未分类";
        // 兼容归一化：把老数据的“经济”合并到“经济理财”
        if (genre === "经济") genre = "经济理财";
        
        if (!categorizedBooks[genre]) {
          categorizedBooks[genre] = [];
        }
        categorizedBooks[genre].push(book);
      });

      // 2. 动态循环生成每个分类的书架
      // 为了让分类有固定顺序，你可以定义一个偏好顺序，不在列表里的自动排在后面
      const genreOrder = ["经济理财", "历史", "科学技术", "文学"];
      const sortedGenres = Object.keys(categorizedBooks).sort((a, b) => {
        let indexA = genreOrder.indexOf(a);
        let indexB = genreOrder.indexOf(b);
        if (indexA === -1) indexA = 99;
        if (indexB === -1) indexB = 99;
        return indexA - indexB;
      });

      sortedGenres.forEach(genre => {
        // 创建书架大标题和网格
        const shelfId = `shelf-${Math.random().toString(36).substr(2, 9)}`;
        const shelfHtml = `
          <div class="bn-genre-section">
            <h2 class="shelf-title">${getGenreIcon(genre)} ${genre}</h2>
            <div class="bn-book-grid" id="${shelfId}"></div>
          </div>
        `;
        shelfContainer.insertAdjacentHTML('beforeend', shelfHtml);
        const gridContainer = document.getElementById(shelfId);

        // 渲染该分类下的所有书籍
        categorizedBooks[genre].forEach(book => {
          // 默认先尝试加载 .jpg 格式
          const primaryCover = `https://raw.githubusercontent.com/qqhsx/book/main/covers/[${book.genre}]${book.title}-${book.author}.jpg`;
          // 备用地址换成 .jpeg 格式
          const backupCover = `https://raw.githubusercontent.com/qqhsx/book/main/covers/[${book.genre}]${book.title}-${book.author}.jpeg`;
          const defaultPlaceholder = "https://via.placeholder.com/150x220?text=No+Cover";

          const cardHtml = `
            <div class="bn-book-card">
              <div class="cover-wrapper">
                <img src="${primaryCover}" 
                     class="bn-book-cover" 
                     onerror="handleCoverError(this, '${backupCover}', '${defaultPlaceholder}')">
              </div>
              <div class="bn-book-title" title="${book.title}">${book.title}</div>
              <div class="bn-book-author" title="${book.author}">${book.author}</div>
              <a href="${book.file_path}" class="bn-read-btn" target="_blank">立即阅读</a>
            </div>
          `;
          gridContainer.insertAdjacentHTML('beforeend', cardHtml);
        });
      });
    })
    .catch(error => {
      shelfContainer.innerHTML = `<div class="error-text">书架加载失败，请刷新重试。错误信息: ${error.message}</div>`;
    });
});

/**
 * 核心：封面多格式兼容错误处理函数
 */
function handleCoverError(imgElement, backupUrl, placeholderUrl) {
  // 如果当前尝试的是第一顺位的 .jpg 并且失败了，切换到 .jpeg
  if (!imgElement.getAttribute('data-tried-backup')) {
    imgElement.setAttribute('data-tried-backup', 'true');
    imgElement.src = backupUrl;
  } else {
    // 如果 .jpeg 也失败了，展示兜底图，并断开死循环
    imgElement.onerror = null;
    imgElement.src = placeholderUrl;
  }
}

/**
 * 辅助：根据分类名自动匹配精美的小图标（可自行在下方增删）
 */
function getGenreIcon(genre) {
  const icons = {
    "经济理财": "🪙",
    "历史": "⏳",
    "科学技术": "🔬",
    "文学": "📚",
    "未分类": "📖"
  };
  return icons[genre] || "🔖"; // 没匹配到时默认用书签图标
}
</script>
