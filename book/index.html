          <div id="bn-dynamic-bookshelf">
  <div class="loading-text">正在从云端加载高颜值书架...</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  // 💡 沿用初版最稳妥的官方直连地址，确保数据实时同步、无缓存延迟
  const jsonUrl = "https://raw.githubusercontent.com/qqhsx/book/main/data.json"; 
  const shelfContainer = document.getElementById("bn-dynamic-bookshelf");

  fetch(jsonUrl)
    .then(response => {
      if (!response.ok) throw new Error("网络响应异常");
      return response.json();
    })
    .then(books => {
      if (!books || books.length === 0) {
        shelfContainer.innerHTML = '<div class="loading-text">书架上空空如也，快去上传书籍吧！</div>';
        return;
      }
      shelfContainer.innerHTML = "";

      // 1. 按分类将书籍归档
      const categorizedBooks = {};
      books.forEach(book => {
        let genre = book.genre || "未分类";
        if (genre === "经济") genre = "经济理财";
        if (!categorizedBooks[genre]) categorizedBooks[genre] = [];
        categorizedBooks[genre].push(book);
      });
    
      // 2. 排序分类
      const genreOrder = ["经济理财", "历史", "科学技术", "文学"];
      const sortedGenres = Object.keys(categorizedBooks).sort((a, b) => {
        let indexA = genreOrder.indexOf(a);
        let indexB = genreOrder.indexOf(b);
        if (indexA === -1) indexA = 99;
        if (indexB === -1) indexB = 99;
        return indexA - indexB;
      });
    
      // 3. 循环渲染每个分类
      sortedGenres.forEach(genre => {
        const shelfId = "shelf-" + Math.random().toString(36).substr(2, 9);
        const btnId = "btn-" + shelfId;
        const allBooks = categorizedBooks[genre];
        
        let btnHtml = "";
        if (allBooks.length > 5) {
          btnHtml = '<button class="bn-view-all-btn" id="' + btnId + '" data-state="collapsed">查看全部 (' + allBooks.length + ') ▾</button>';
        }

        const shelfHtml = 
          '<div class="bn-genre-section">' +
            '<div class="shelf-header">' +
              '<h2 class="shelf-title">' + getGenreIcon(genre) + ' ' + genre + '</h2>' +
              btnHtml +
            '</div>' +
            '<div class="bn-book-grid mode-scroll" id="' + shelfId + '"></div>' +
          '</div>';

        shelfContainer.insertAdjacentHTML('beforeend', shelfHtml);
        const gridContainer = document.getElementById(shelfId);
    
        // 渲染该分类下的所有书籍
        allBooks.forEach(book => {
          const primaryCover = 'https://raw.githubusercontent.com/qqhsx/book/main/covers/[' + book.genre + ']' + book.title + '-' + book.author + '.jpg';
          const backupCover = 'https://raw.githubusercontent.com/qqhsx/book/main/covers/[' + book.genre + ']' + book.title + '-' + book.author + '.jpeg';
    
          // 💡 升级版核心：改用 CSS 背景图机制，避开主题对 <img> 标签的干扰，实现完全像素级对齐
          const cardHtml = 
            '<div class="bn-book-card">' +
              '<div class="cover-wrapper" style="background-image: url(\'' + primaryCover + '\');" data-backup="' + backupCover + '">' +
              '</div>' +
              '<div class="bn-book-title" title="' + book.title + '">' + book.title + '</div>' +
              '<div class="bn-book-author" title="' + book.author + '">' + book.author + '</div>' +
              '<a href="' + book.file_path + '" class="bn-read-btn" target="_blank">立即阅读</a>' +
            '</div>';

          gridContainer.insertAdjacentHTML('beforeend', cardHtml);
        });

        // 💡 自动追补加载错误的 .jpeg 图片逻辑
        gridContainer.querySelectorAll('.cover-wrapper').forEach(wrapper => {
          const bgUrl = wrapper.style.backgroundImage.slice(5, -2);
          const img = new Image();
          img.src = bgUrl;
          img.onerror = function() {
            const backup = wrapper.getAttribute('data-backup');
            wrapper.style.backgroundImage = "url('" + backup + "')";
            
            const img2 = new Image();
            img2.src = backup;
            img2.onerror = function() {
              wrapper.style.backgroundImage = "url('https://via.placeholder.com/150x220?text=No+Cover')";
            };
          };
        });
    
        // 💡 滚轮横转魔法：让普通鼠标上下滚轮，转化为书架左右滑动
        gridContainer.addEventListener('wheel', function(e) {
          if (gridContainer.classList.contains('mode-scroll')) {
            e.preventDefault(); 
            gridContainer.scrollLeft += e.deltaY; 
          }
        });

        // 4. 绑定双模切换事件
        if (allBooks.length > 5) {
          const toggleBtn = document.getElementById(btnId);
          toggleBtn.addEventListener('click', function() {
            const isCollapsed = this.getAttribute('data-state') === 'collapsed';
            
            if (isCollapsed) {
              gridContainer.classList.remove('mode-scroll');
              gridContainer.classList.add('mode-grid');
              this.setAttribute('data-state', 'expanded');
              this.innerHTML = '收起书架 ▴';
            } else {
              gridContainer.classList.remove('mode-grid');
              gridContainer.classList.add('mode-scroll');
              this.setAttribute('data-state', 'collapsed');
              this.innerHTML = '查看全部 (' + allBooks.length + ') ▾';
            }
          });
        }
      });
    })
    .catch(error => {
      shelfContainer.innerHTML = '<div class="error-text">书架加载失败: ' + error.message + '</div>';
    });
});

function getGenreIcon(genre) {
  const icons = { "经济理财": "🤑", "历史": "⏳", "科学技术": "🔬", "文学": "📚", "未分类": "📖" };
  return icons[genre] || "🔖";
}
</script>

/* 点击展开后：网格平铺模式 */

/* 💡 降维打击样式：绝对定死外框大小，不受 Hexo 主题任何 img 规则的干扰 */
.cover-wrapper {
  width: 150px !important;
  height: 220px !important;
  overflow: hidden;
  border-radius: 4px;
  box-shadow: 0 8px 16px rgba(0,0,0,0.12), 0 2px 4px rgba(0,0,0,0.06);
  margin-bottom: 12px;
  background-color: #f5f5f5;
  
  /* 精准背景图定位及完全填满 */
  background-position: center !important;
  background-size: cover !important;
  background-repeat: no-repeat !important;
  transition: transform 0.3s ease;
}
.bn-book-card:hover .cover-wrapper { transform: scale(1.05); }

.bn-book-title { font-size: 14px; font-weight: 600; color: #2b2b2b; margin: 4px 0; line-height: 1.3; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bn-book-author { font-size: 12px; color: #767676; margin-bottom: 10px; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.bn-read-btn {
  display: inline-block;
  width: 85%;

  background-color: #006644 !important;
  color: #ffffff !important;
  font-size: 12px;
  font-weight: 500;
  text-decoration: none !important;
  border-radius: 20px;
  transition: background-color 0.2s ease;
  margin-top: auto;
}
